services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-personal_page}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-personal_page}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    working_dir: /app
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-personal_page}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-only-secret-change-me-0123456789-abcdefghijklmnopqrstuvwxyz}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      GITHUB_TIMELINE_USER: ${GITHUB_TIMELINE_USER:-QSchlegel}
      ADMIN_EMAIL_ALLOWLIST: ${ADMIN_EMAIL_ALLOWLIST:-mail@quirinschlegel.com}
      CRON_SECRET: ${CRON_SECRET:-replace-this-cron-secret}
      BOT_RELAY_TOKEN: ${BOT_RELAY_TOKEN:-replace-this-relay-token}
      BOT_HMAC_SECRET_ROTATION_WINDOW_DAYS: ${BOT_HMAC_SECRET_ROTATION_WINDOW_DAYS:-30}
      PUBLIC_GITHUB_URL: ${PUBLIC_GITHUB_URL:-https://github.com/QSchlegel}
      PUBLIC_TWITTER_URL: ${PUBLIC_TWITTER_URL:-https://x.com/}
      PUBLIC_EMAIL: ${PUBLIC_EMAIL:-mail@quirinschlegel.com}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    command: >
      sh -c "npm install &&
      npx prisma generate &&
      npx prisma db push &&
      npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  postgres_data:
  app_node_modules:
